<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayien Masterlink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
   .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
   .hidden { display: none; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="app" class="min-h-screen">
    <!-- Auth Section -->
    <div id="authSection" class="flex items-center justify-center min-h-screen">
      <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold text-center mb-6">Rayien Masterlink</h1>
        <div class="space-y-4">
          <input id="email" type="email" placeholder="Email" class="w-full border p-3 rounded">
          <input id="password" type="password" placeholder="Password" class="w-full border p-3 rounded">
          <button id="loginBtn" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 flex items-center justify-center gap-2">
            <span id="loginText">Login</span>
            <div id="loginLoader" class="loader hidden"></div>
          </button>
          <p id="authError" class="text-red-500 text-sm text-center"></p>
        </div>
      </div>
    </div>
    <!-- Dashboard Section -->
    <div id="dashboardSection" class="hidden">
      <header class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">Dashboard</h1>
        <div class="flex items-center gap-4">
          <span id="userInfo" class="text-sm"></span>
          <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
        </div>
      </header>
      <main id="dashboardContent" class="p-4 max-w-7xl mx-auto"></main>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, addDoc, collection, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAb_8wp3ROSawtBldiM2jUH2NcWkS3Y8Qk",
      authDomain: "rayien-masterlink-1697c.firebaseapp.com",
      projectId: "rayien-masterlink-1697c",
      storageBucket: "rayien-masterlink-1697c.firebasestorage.app",
      messagingSenderId: "1064074654872",
      appId: "1:1064074654872:web:74ce7391f99ff579f38ced",
      measurementId: "G-98XRFL9BZ4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userData = null;
    let userRole = null;
    let userSchoolId = null;
    let userSchoolName = null;
    let userId = null;

    // FIXED Auth state listener
    onAuthStateChanged(auth, async (user) => {
      const loader = document.getElementById('loginLoader');
      const loginText = document.getElementById('loginText');
      const errorEl = document.getElementById('authError');

      if (user) {
        try {
          currentUser = user;
          userId = user.email.replace(/\./g, '_');
          await loadUserData(userId);
          showDashboard();
        } catch (err) {
          console.error("Failed to load user data:", err);
          errorEl.textContent = "Login succeeded but failed to load profile: " + err.message;
          await signOut(auth);
        } finally {
          loader.classList.add('hidden');
          loginText.textContent = "Login";
        }
      } else {
        currentUser = null;
        userData = null;
        userId = null;
        showAuth();
        loader.classList.add('hidden');
        loginText.textContent = "Login";
      }
    });

    // FIXED Login handler
    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('authError');
      const loader = document.getElementById('loginLoader');
      const loginText = document.getElementById('loginText');

      if (!email ||!password) {
        errorEl.textContent = "Please enter email and password";
        return;
      }

      loader.classList.remove('hidden');
      loginText.textContent = "Logging in...";
      errorEl.textContent = "";

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        console.error("Login error:", err);
        errorEl.textContent = "Login failed: " + err.message;
        loader.classList.add('hidden');
        loginText.textContent = "Login";
      }
    };

    document.getElementById('logoutBtn').onclick = async () => {
      await signOut(auth);
    };

    async function loadUserData(uid) {
      const userDoc = await getDoc(doc(db, "users", uid));
      if (userDoc.exists()) {
        userData = userDoc.data();
        userRole = userData.role;
        userSchoolId = userData.schoolId;
        userSchoolName = userData.schoolName;
      } else {
        userData = {
          uid: currentUser.uid,
          email: currentUser.email,
          name: currentUser.displayName || currentUser.email.split('@')[0],
          role: "teacher",
          schoolId: null,
          schoolName: null,
          assignedClasses: [],
          assignedSubjects: [],
          createdAt: serverTimestamp()
        };
        await setDoc(doc(db, "users", uid), userData);
      }
    }

    function showAuth() {
      document.getElementById('authSection').classList.remove('hidden');
      document.getElementById('dashboardSection').classList.add('hidden');
    }

    function showDashboard() {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('dashboardSection').classList.remove('hidden');
      document.getElementById('userInfo').textContent = `${userData.name} | ${userRole || 'teacher'} | ${userSchoolName || 'No School'}`;
      renderDashboard();
    }

    function renderDashboard() {
      const content = document.getElementById('dashboardContent');
      const isSuperAdmin = userRole === 'super_admin' || userRole === 'superadmin' || currentUser.email === 'onyangowycliffe@gmail.com';
      if (isSuperAdmin || userRole === 'admin') {
        renderAdminDashboard(content);
      } else {
        renderTeacherDashboard(content);
      }
    }

    // Paste your existing dashboard functions below this line unchanged
    function renderTeacherDashboard(container) { container.innerHTML = `<div>Teacher dashboard loading...</div>`; }
    function renderAdminDashboard(container) { container.innerHTML = `<div>Admin dashboard loading...</div>`; }
    //...keep all your other functions from your original code here
  </script>
</body>
</html>
